version: '3.9'

services:
  web:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173
    stdin_open: true
    tty: true
    networks:
      - my-shared-network

networks:
  my-shared-network:
    external: true

# Для production можно переключиться на npm run build и с отдачей через nginx отдельно.
